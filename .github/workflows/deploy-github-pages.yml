# Builds the Expo web export and publishes it to GitHub Pages (free HTTPS hosting by GitHub).
# One-time setup: Repo → Settings → Pages → Build and deployment → Source: GitHub Actions.
# After the first successful run, the site URL is shown in the workflow summary and in Pages settings.
# Example for this project: https://ilovelapras.github.io/transport-connect/
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Build static web (asset paths use /REPO_NAME for GitHub Pages project sites)
        env:
          EXPO_WEB_BASE_PATH: /${{ github.event.repository.name }}
        run: npm run build:web
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
